# ============================================================
# NAME: PayPal
# DESC: 自维护 PayPal 分流规则集
# TYPE: Mihomo / Clash 系 rule-provider
# behavior: classical   <- 含 PROCESS-NAME，不能改用 domain 行为
# format: yaml
#
# 维护方法：
#   连接面板观察未命中目标策略组的域名，按格式追加后 push。
# 注意：PayPal 风控对出口 IP 归属地和跳变敏感，
#   本集指向的策略组应固定单一地区节点，不要用自动切换组。
# ============================================================
payload:
  # ===== 进程规则（安卓按包名命中，其它平台自动跳过） =====
  - PROCESS-NAME,com.paypal.android.p2pmobile   # PayPal 官方 App（抓包确认）

  # ===== PayPal 核心域 =====
  - DOMAIN-SUFFIX,paypal.com                    # 主域，含 api-m.paypal.com 等 App/API 子域
  - DOMAIN-SUFFIX,paypal.me                     # 收款链接短域
  - DOMAIN-SUFFIX,paypalobjects.com             # 静态资源 CDN
  - DOMAIN-SUFFIX,paypal-community.com          # 社区论坛
  - DOMAIN-SUFFIX,paypalcorp.com                # 企业站

  # ===== Braintree（PayPal 旗下支付网关，第三方商户结账页常见） =====
  - DOMAIN-SUFFIX,braintreegateway.com
  - DOMAIN-SUFFIX,braintreepayments.com
  - DOMAIN-SUFFIX,braintree-api.com

  # ===== 子品牌（不用相关业务可整段删除） =====
  - DOMAIN-SUFFIX,venmo.com                     # 美区 P2P 转账
  - DOMAIN-SUFFIX,xoom.com                      # 国际汇款

